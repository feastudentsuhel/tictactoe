<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="stars"></div>
<div class="floor"><div class="floor-grid"></div></div>

<div class="container">

  <!-- Top bar -->
  <div class="topbar">
    <button class="icon-btn" id="btn-undo" title="Undo">↩</button>
    <button class="icon-btn pink" title="Settings">⚙</button>
  </div>

  <!-- Player bar -->
  <div class="player-bar turn-o" id="player-bar">
    <div class="player-info">
      <span class="player-label">Player 1</span>
      <div class="player-symbol"><div class="sym-o"></div></div>
    </div>
    <div class="turn-dots">
      <div class="dot filled" id="dot1"></div>
      <div class="dot filled" id="dot2"></div>
      <div class="dot filled" id="dot3"></div>
    </div>
    <div class="player-info">
      <span class="player-label">Player 2</span>
      <div class="player-symbol"><div class="sym-x"></div></div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board-container">
      <div class="board" id="board">
        <!-- Cells generated by JS -->
      </div>
      <svg id="strike-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="status">Player 1's Turn</div>

  <!-- Scores -->
  <div class="scores">
    <div class="chip o-chip">O <span class="chip-val" id="sc-o">0</span></div>
    <div class="chip">D <span class="chip-val" id="sc-d">0</span></div>
    <div class="chip x-chip">X <span class="chip-val" id="sc-x">0</span></div>
  </div>

  <!-- Reset -->
  <div class="reset-wrap">
    <button class="btn-reset" id="btn-reset" title="New Game">↺</button>
  </div>

</div>

<div class="made-by">
  <span class="line1">Made by Suhel</span>
  <span class="line2">Love you Shantanu ❤️</span>
</div>

<script src="script.js"></script>
</body>
</html>
